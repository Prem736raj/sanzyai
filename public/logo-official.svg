<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <!-- Glow effect for nodes -->
        <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Background is not strictly part of SVG, but helpful for testing -->
    <!-- <rect width="200" height="200" fill="#f4f1e1" /> -->

    <!-- Outer Gear -->
    <!-- Gear has a thick dark outline and a second inner line -->
    <path d="M 167.61 81.88 L 168.94 87.84 L 180.75 85.76 L 181.55 91.43 L 193.49 90.17 L 193.49 109.83 L 181.55 108.57 L 180.75 114.24 L 168.94 112.16 L 167.61 118.12 L 167.61 118.12 L 165.78 123.94 L 177.05 128.05 L 174.91 133.35 L 185.87 138.23 L 176.05 155.25 L 166.34 148.20 L 162.82 152.71 L 153.62 145.00 L 149.50 149.50 L 149.50 149.50 L 145.00 153.62 L 152.71 162.82 L 148.20 166.34 L 155.25 176.05 L 138.23 185.87 L 133.35 174.91 L 128.05 177.05 L 123.94 165.78 L 118.12 167.61 L 118.12 167.61 L 112.16 168.94 L 114.24 180.75 L 108.57 181.55 L 109.83 193.49 L 90.17 193.49 L 91.43 181.55 L 85.76 180.75 L 87.84 168.94 L 81.88 167.61 L 81.88 167.61 L 76.06 165.78 L 71.95 177.05 L 66.65 174.91 L 61.77 185.87 L 44.75 176.05 L 51.80 166.34 L 47.29 162.82 L 55.00 153.62 L 50.50 149.50 L 50.50 149.50 L 46.38 145.00 L 37.18 152.71 L 33.66 148.20 L 23.95 155.25 L 14.13 138.23 L 25.09 133.35 L 22.95 128.05 L 34.22 123.94 L 32.39 118.12 L 32.39 118.12 L 31.06 112.16 L 19.25 114.24 L 18.45 108.57 L 6.51 109.83 L 6.51 90.17 L 18.45 91.43 L 19.25 85.76 L 31.06 87.84 L 32.39 81.88 L 32.39 81.88 L 34.22 76.06 L 22.95 71.95 L 25.09 66.65 L 14.13 61.77 L 23.95 44.75 L 33.66 51.80 L 37.18 47.29 L 46.38 55.00 L 50.50 50.50 L 50.50 50.50 L 55.00 46.38 L 47.29 37.18 L 51.80 33.66 L 44.75 23.95 L 61.77 14.13 L 66.65 25.09 L 71.95 22.95 L 76.06 34.22 L 81.88 32.39 L 81.88 32.39 L 87.84 31.06 L 85.76 19.25 L 91.43 18.45 L 90.17 6.51 L 109.83 6.51 L 108.57 18.45 L 114.24 19.25 L 112.16 31.06 L 118.12 32.39 L 118.12 32.39 L 123.94 34.22 L 128.05 22.95 L 133.35 25.09 L 138.23 14.13 L 155.25 23.95 L 148.20 33.66 L 152.71 37.18 L 145.00 46.38 L 149.50 50.50 L 149.50 50.50 L 153.62 55.00 L 162.82 47.29 L 166.34 51.80 L 176.05 44.75 L 185.87 61.77 L 174.91 66.65 L 177.05 71.95 L 165.78 76.06 L 167.61 81.88 Z" fill="#d39158" stroke="#2a4645" stroke-width="4" stroke-linejoin="round"/>
    
    <!-- Inner Dark Line of Gear -->
    <path d="M 167.61 81.88 L 168.94 87.84 L 180.75 85.76 L 181.55 91.43 L 193.49 90.17 L 193.49 109.83 L 181.55 108.57 L 180.75 114.24 L 168.94 112.16 L 167.61 118.12 L 167.61 118.12 L 165.78 123.94 L 177.05 128.05 L 174.91 133.35 L 185.87 138.23 L 176.05 155.25 L 166.34 148.20 L 162.82 152.71 L 153.62 145.00 L 149.50 149.50 L 149.50 149.50 L 145.00 153.62 L 152.71 162.82 L 148.20 166.34 L 155.25 176.05 L 138.23 185.87 L 133.35 174.91 L 128.05 177.05 L 123.94 165.78 L 118.12 167.61 L 118.12 167.61 L 112.16 168.94 L 114.24 180.75 L 108.57 181.55 L 109.83 193.49 L 90.17 193.49 L 91.43 181.55 L 85.76 180.75 L 87.84 168.94 L 81.88 167.61 L 81.88 167.61 L 76.06 165.78 L 71.95 177.05 L 66.65 174.91 L 61.77 185.87 L 44.75 176.05 L 51.80 166.34 L 47.29 162.82 L 55.00 153.62 L 50.50 149.50 L 50.50 149.50 L 46.38 145.00 L 37.18 152.71 L 33.66 148.20 L 23.95 155.25 L 14.13 138.23 L 25.09 133.35 L 22.95 128.05 L 34.22 123.94 L 32.39 118.12 L 32.39 118.12 L 31.06 112.16 L 19.25 114.24 L 18.45 108.57 L 6.51 109.83 L 6.51 90.17 L 18.45 91.43 L 19.25 85.76 L 31.06 87.84 L 32.39 81.88 L 32.39 81.88 L 34.22 76.06 L 22.95 71.95 L 25.09 66.65 L 14.13 61.77 L 23.95 44.75 L 33.66 51.80 L 37.18 47.29 L 46.38 55.00 L 50.50 50.50 L 50.50 50.50 L 55.00 46.38 L 47.29 37.18 L 51.80 33.66 L 44.75 23.95 L 61.77 14.13 L 66.65 25.09 L 71.95 22.95 L 76.06 34.22 L 81.88 32.39 L 81.88 32.39 L 87.84 31.06 L 85.76 19.25 L 91.43 18.45 L 90.17 6.51 L 109.83 6.51 L 108.57 18.45 L 114.24 19.25 L 112.16 31.06 L 118.12 32.39 L 118.12 32.39 L 123.94 34.22 L 128.05 22.95 L 133.35 25.09 L 138.23 14.13 L 155.25 23.95 L 148.20 33.66 L 152.71 37.18 L 145.00 46.38 L 149.50 50.50 L 149.50 50.50 L 153.62 55.00 L 162.82 47.29 L 166.34 51.80 L 176.05 44.75 L 185.87 61.77 L 174.91 66.65 L 177.05 71.95 L 165.78 76.06 L 167.61 81.88 Z" fill="none" stroke="#2a4645" stroke-width="1.5" transform="scale(0.92) translate(8.7, 8.7)"/>

    <!-- Teal Inner Circle -->
    <circle cx="100" cy="100" r="62" fill="#3a7f85" stroke="#2a4645" stroke-width="4"/>
    
    <!-- Thin dark inner ring inside the teal circle -->
    <circle cx="100" cy="100" r="54" fill="none" stroke="#2a4645" stroke-width="1.5" opacity="0.5"/>

    <!-- Network Lines -->
    <!-- A series of curved and straight thin golden lines connecting nodes -->
    <g stroke="#f4d18d" stroke-width="1.5" fill="none" opacity="0.8">
        <!-- Spherical curves -->
        <path d="M 60 70 Q 100 30 140 70" />
        <path d="M 50 100 Q 100 40 150 100" />
        <path d="M 60 130 Q 100 170 140 130" />
        <path d="M 50 100 Q 100 160 150 100" />
        
        <path d="M 70 60 Q 30 100 70 140" />
        <path d="M 100 50 Q 40 100 100 150" />
        <path d="M 130 60 Q 170 100 130 140" />
        <path d="M 100 50 Q 160 100 100 150" />
        
        <!-- Straight connections -->
        <line x1="80" y1="130" x2="120" y2="130" />
        <line x1="120" y1="130" x2="140" y2="100" />
        <line x1="60" y1="100" x2="80" y2="130" />
        <line x1="80" y1="70" x2="120" y2="70" />
        <line x1="120" y1="70" x2="140" y2="100" />
        <line x1="60" y1="100" x2="80" y2="70" />
    </g>

    <!-- Network Nodes (Glowing Dots) -->
    <!-- The nodes are at intersections -->
    <g fill="#fff9d6" filter="url(#glow)">
        <circle cx="80" cy="70" r="4" />
        <circle cx="120" cy="70" r="4.5" />
        <circle cx="140" cy="100" r="3.5" />
        <circle cx="120" cy="130" r="5" />
        <circle cx="80" cy="130" r="4" />
        <circle cx="60" cy="100" r="5.5" />
        <circle cx="100" cy="50" r="3" />
        <circle cx="100" cy="150" r="3" />
        <circle cx="50" cy="130" r="2.5" />
    </g>

    <!-- Compass Needle -->
    <!-- Pointing to top right, ~55 degrees from top -->
    <g transform="rotate(55 100 100)">
        <!-- Bottom Half (Dark Teal) -->
        <path d="M 94 100 L 100 140 L 106 100 Z" fill="#2a4645" />
        <!-- Top Half (Golden Brown) -->
        <path d="M 94 100 L 100 55 L 106 100 Z" fill="#d39158" stroke="#2a4645" stroke-width="1.5" stroke-linejoin="round"/>
        <path d="M 94 100 L 100 140 L 106 100 Z" fill="none" stroke="#2a4645" stroke-width="1.5" stroke-linejoin="round"/>
        <!-- Pivot Dot -->
        <circle cx="100" cy="100" r="3" fill="#2a4645" />
    </g>

    <!-- Stylized Key -->
    <!-- Positioned on the left side of the inner circle -->
    <g transform="translate(45, 95) rotate(-10) scale(0.8)" stroke="#d39158" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="0" cy="0" r="6" />
        <line x1="0" y1="6" x2="0" y2="24" />
        <line x1="0" y1="18" x2="6" y2="18" />
        <line x1="0" y1="22" x2="4" y2="22" />
        <circle cx="0" cy="0" r="2" fill="#d39158" stroke="none" />
    </g>
    
</svg>
