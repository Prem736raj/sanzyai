<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magnetic Energy Hub | SanzyAI</title>
    <link rel="stylesheet" href="./src/globals.css">
    <link rel="stylesheet" href="./src/motivation.css">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;500;700;800;900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
</head>
<body class="motivation-page">
    <!-- Particle Background -->
    <div class="energy-field">
        <canvas id="energy-canvas"></canvas>
        <div class="gradient-overlay"></div>
    </div>

    <!-- Main Motivation Experience -->
    <main class="motivation-viewport">
        <!-- Magnetic Logo Hub -->
        <div class="logo-animation-container" id="logoAnimation">
            <!-- Animation Layers -->
            <div id="ring-layer"></div>
            <div id="dot-layer"></div>
            <div id="spark-layer"></div>
            <div id="shockwave-layer"></div>
            
            <!-- Floating Tooltip -->
            <div class="logo-tooltip" id="logoTooltip">⚡ Powered by AI</div>

            <!-- Central Logo Component -->
            <div class="logo-wrapper">
                <div class="main-logo-button" id="mainLogo" style="background: none; box-shadow: none;">
                    <img src="./public/logo-official.png" alt="SanzyAI Official Logo" class="logo-official-img" style="width: 100%; height: 100%; object-fit: contain;">
                    <div class="inner-glow" id="innerGlow"></div>
                </div>
                <div class="brand-name" id="brandName">SanzyAI</div>
            </div>
        </div>

        <!-- Dynamic Quote Section -->
        <div class="typography-layer">
            <div class="quote-stage">
                <p class="quote-text active" id="quoteText">Click the core to generate a surge of creative energy.</p>
                <p class="quote-author active" id="quoteAuthor">— THE DEVELOPER</p>
            </div>
        </div>
    </main>

    <script type="module" src="./src/motivation.js"></script>
</body>
</html>
